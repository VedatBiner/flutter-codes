# 📦 Pubspec — kelimelik_words_app
# Kelimelik uygulaması: kelime listesi, SQLite tabanlı kayıt ve dışa aktarma

name: kelimelik_words_app
description: "Kelimelik uygulaması kelime listesi"
publish_to: 'none'

version: 2.5.2+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # -----------------------------
  # UI / İkon setleri / Görsel
  # -----------------------------
  cupertino_icons: ^1.0.8          # iOS tarzı ikon seti
  font_awesome_flutter:            # Geniş ikon koleksiyonu (FA)

  # -----------------------------
  # Durum yönetimi / Modelleme
  # -----------------------------
  provider:                        # ChangeNotifier tabanlı state management
  equatable:                       # Model/state sınıflarında değer temelli eşitlik (==/hashCode)

  # -----------------------------
  # Veritabanı / Depolama
  # -----------------------------
  sqflite:                         # Cihaz içi SQLite (CRUD)
  path_provider:                   # Belgeler/Geçici/İndirilenler dizinleri (platforma özel)
  path:                            # Dosya yolu işlemleri (join/dirname/extension)

  # -----------------------------
  # İhracat / Paylaşım / Excel
  # -----------------------------
  syncfusion_flutter_xlsio:        # XLSX üretimi (hücre biçimlendirme, AutoFilter, auto-fit)
  share_plus:                      # Metin/dosya/link paylaşımı (sistem paylaşım menüsü)

  # -----------------------------
  # İzinler
  # -----------------------------
  permission_handler:              # Çalışma zamanı izinleri (Android/iOS)

  # -----------------------------
  # Uygulama bilgisi
  # -----------------------------
  package_info_plus:               # Uygulama sürümü, build numarası, paket adı
  device_info_plus:                # Cihaz modeli, Android/iOS sürümü

  # -----------------------------
  # Listeleme / UX yardımcıları
  # -----------------------------
  elegant_notification:            # Modern toast/notification bileşenleri
  alphabet_list_view:              # A–Z hızlı gezinmeli liste görünümü
  value_layout_builder: ^0.5.0     # Layout sırasında hesaplanan value ’yu builder ’a iletme

  # -----------------------------
  # CSV okuma / yazma işlemleri
  # -----------------------------
  csv:                             # CSV parse, read, write işlemleri

  # -----------------------------
  # Grafik / Tarih
  # -----------------------------
  fl_chart:
  intl:

  google_fonts:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0 # Dart/Flutter linter kuralları

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/database/

  fonts:
    - family: Oswald
      fonts:
        - asset: assets/fonts/oswald.ttf